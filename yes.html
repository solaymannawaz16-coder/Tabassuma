<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>She Said Yes ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff416c,#ff4b2b,#ff6ec7,#7873f5);
background-size:400% 400%;
animation:bg 12s infinite;
overflow:hidden;
text-align:center;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.box{
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
padding:50px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
width:90%;
max-width:750px;
animation:pop 1.2s ease;
}

@keyframes pop{
from{
transform:scale(.7);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

h1{
font-size:55px;
margin-bottom:20px;
}

p{
font-size:24px;
line-height:1.8;
margin-top:20px;
}

.love{
font-size:70px;
animation:beat 1s infinite;
margin-top:30px;
}

@keyframes beat{
0%,100%{transform:scale(1);}
50%{transform:scale(1.25);}
}

</style>

</head>

<body>

<div class="box">

<h1>🎉 She Said YES! 🎉</h1>

<p>

My Dearest <strong>Tabassum</strong>, ❤️

<br><br>

Today is one of the happiest moments of my life.

Thank you for choosing me.

I promise to stand beside you,
respect you,
support you,
and love you every single day.

No matter what life brings,
I'll always choose you.

Forever and Always.

💍❤️

</p>

<div class="love">❤️</div>

</div>

</body>
</html>
