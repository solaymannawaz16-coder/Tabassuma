<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>💖 Dear Tabassum 💖</h1>

    <h2>I have something very special to ask you...</h2>

    <p class="message">
        From the day you came into my life,<br>
        every moment has become more beautiful.<br><br>

        You are my happiness, my peace,
        and the person I want beside me forever.
    </p>

    <h2 class="question">
        Will you marry me? 💍
    </h2>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😅</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
